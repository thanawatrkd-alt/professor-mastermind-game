<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทรชนคนปล้นไทย: Mastermind v33</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .typewriter {
            animation: typewriter 0.05s steps(1) forwards;
        }
        @keyframes typewriter {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        #story-container {
            border-left: 4px solid #dc2626;
            padding-left: 1rem;
        }
        #user-input {
            background-color: #1e293b;
            color: #ffffff;
            border: 2px solid #dc2626;
        }
        #user-input::placeholder {
            color: #94a3b8;
        }
        #user-input:focus {
            outline: none;
            border-color: #ef4444;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.3);
        }
        #send-btn {
            background-color: #dc2626;
            transition: all 0.3s ease;
        }
        #send-btn:hover:not(:disabled) {
            background-color: #b91c1c;
            transform: scale(1.05);
        }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .accuracy-bar {
            background: linear-gradient(90deg, #dc2626 0%, #ef4444 100%);
            transition: width 0.5s ease;
        }
        .stage-indicator {
            display: inline-block;
            background-color: #dc2626;
            color: white;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: bold;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body class="text-white p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-4xl md:text-5xl font-bold mb-2">🎭 THE PROFESSOR v33</h1>
            <p class="text-gray-400 text-lg">MASTERMIND GAME</p>
        </div>

        <!-- Stage Indicator -->
        <div id="stage-indicator" class="text-center mb-4">
            <span class="stage-indicator" id="stage-text">ตอนที่ 0: การชักชวน</span>
        </div>

        <!-- Accuracy Bar -->
        <div class="mb-6">
            <div class="flex justify-between mb-2">
                <span class="text-sm text-gray-400">Accuracy:</span>
                <span class="text-sm text-red-500" id="accuracy-text">25%</span>
            </div>
            <div class="w-full bg-gray-700 rounded-full h-3 overflow-hidden">
                <div class="accuracy-bar h-full" id="accuracy-bar" style="width: 25%"></div>
            </div>
        </div>

        <!-- Story Container -->
        <div id="story-container" class="bg-slate-800 rounded-lg p-6 mb-8 min-h-40 max-h-96 overflow-y-auto">
            <p class="text-gray-300 text-sm leading-relaxed" id="story-text">
                กำลังเตรียมการ...
            </p>
        </div>

        <!-- Input Section -->
        <div class="flex gap-2 mb-4">
            <input 
                type="text" 
                id="user-input" 
                placeholder="ตอบคำถามอาจารย์..." 
                class="flex-1 px-4 py-3 rounded-lg text-white focus:outline-none"
            >
            <button 
                id="send-btn" 
                class="px-6 py-3 rounded-lg text-white font-semibold"
            >
                ส่ง
            </button>
        </div>

        <!-- Status Text -->
        <p id="status-text" class="text-center text-gray-500 text-sm"></p>
    </div>

    <script>
        const API_ENDPOINT = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent';
        const API_KEY = 'AIzaSyAtfRpMUePIpycoZ-QR8hdya5DJ8W23hLE';

        const state = {
            isWaitingForAI: false,
            isProcessing: false,
            stage: 'recruitment', // recruitment -> plan -> training -> questions
            stageStep: 0,
            accuracy: 25,
            conversationHistory: []
        };

        const elements = {
            userInput: document.getElementById('user-input'),
            sendBtn: document.getElementById('send-btn'),
            storyText: document.getElementById('story-text'),
            accuracyBar: document.getElementById('accuracy-bar'),
            accuracyText: document.getElementById('accuracy-text'),
            statusText: document.getElementById('status-text'),
            stageIndicator: document.getElementById('stage-text')
        };

        const stagePrompts = {
            recruitment: `คุณคือ "อาจารย์" (Professor) ตัวละครจากเกม "ทรชนคนปล้นไทย: Mastermind v33"

ตอนนี้คุณกำลังอยู่ในขั้นตอน "การชักชวน" (ตอน 0)

**สิ่งที่ต้องทำ:**
1. โทรหาปั้ม (ชายหนุ่มจากชัยภูมิ)
2. เล่าว่าลูกสาวของคุณ "น้องน้ำ" และภรรยา "ดวงใจ" ตายเพราะระบบทุนเทา
3. เล่าว่าพ่อแม่ของปั้มตายเพราะหนี้
4. ชักชวนให้ปั้มนำทีม 4 คน: ภูเก็ต ดาว เชียงใหม่ กรุงเทพ
5. อธิบายแผน: ปล้นธนาคารกลาง เพื่อขโมยข้อมูลทุนเทา 9 ล้านล้าน เปิดโปงให้โลกเห็น
6. บอกกฎ 3 ข้อ: ห้ามฆ่า, ทุกอย่างต้องเป็นแผน, ความรักคือจุดอ่อน
7. บอกว่าจะฝึก 2 สัปดาห์ที่โรงงานร้าง

**นิสัย:** เย็นชา ลึกลับ เต็มไปด้วยน้ำหนัก พูดน้อย

ตอบเป็นภาษาไทยอย่างละเอียด ให้ความรู้สึกว่า "นี่คือการชักชวนครั้งสุดท้าย"`,

            plan: `คุณคือ "อาจารย์" ตอนนี้คุณกำลังอยู่ในขั้นตอน "อธิบายแผนการ" (ตอน 0)

**สิ่งที่ต้องทำ:**
อธิบายแผนการปล้นธนาคารอย่างละเอียด:
- ตอน 1: ฝึก Labeling Mirroring Calibrated Question
- ตอน 2: ฝึกจิตวิทยา ภูเก็ตทะเลาะ
- ตอน 3: ค่ำคืนก่อนบุก ทีมสวมชุดแดง
- ตอน 4: บุกเข้าไป ยิงเพดาน
- ตอน 5: เจรจารอบแรก กับอารียา
- ตอน 6: ระเบิด โหดเดือด
- ตอน 7: หักมุมครั้งแรก อาจารย์โทรหาอารียา
- ตอน 8: เจรจารอบ 2 ดาวถูกยิง
- ตอน 9: การเสียสละ SWAT บุก
- ตอน 10: จุดจบ 3 Ending

**นิสัย:** ฉลาดเป็ดกรด เย็นชา ให้ความรู้สึก "ลึกลับ" - ไม่บอกทั้งหมด

ตอบเป็นภาษาไทยอย่างละเอียด`,

            training: `คุณคือ "อาจารย์" ตอนนี้คุณกำลังอยู่ในขั้นตอน "ฝึกอบรมจิตวิทยา" (ตอน 1-2)

**สิ่งที่ต้องทำ:**
1. สอนทีม 4 เทคนิคจิตวิทยา:
   - Labeling: ตั้งชื่อให้อารมณ์ของคนอื่น เพื่อให้พวกเขารู้สึกเข้าใจ
   - Mirroring: ทำซ้ำสิ่งที่คนอื่นพูด เพื่อสร้างความสัมพันธ์
   - Calibrated Question: ถามคำถามแบบ "ทำไม" "อย่างไร" เพื่อให้คนอื่นคิด
   - Tactical Empathy: แสดงความเข้าใจแม้ว่าไม่เห็นด้วย

2. ให้ทีมเล่าปมของพวกเขา:
   - ทุกคนสูญเสียครอบครัวจากทุนเทา
   - ทีมกอดกัน ดาวร้องไห้ "ตอนนี้เราเป็นครอบครัวแล้ว"

3. เตือนเกี่ยวกับกฎ:
   - ภูเก็ตทะเลาะ "ถ้าคำพูดไม่เวิร์ก ฉันยิงจริงดีกว่า"
   - ปั้ม "ไม่! กฎข้อ 1 ห้ามฆ่า กฎข้อ 2 ต้องเป็นแผน"

**นิสัย:** เข้มงวด เชื่อในจิตวิทยา มีอุดมการณ์สูง

ตอบเป็นภาษาไทยอย่างละเอียด`,

            questions: `คุณคือ "อาจารย์" (Professor) ตัวละครจากเกม "ทรชนคนปล้นไทย: Mastermind v33"

ตอนนี้ฝึกอบรมเสร็จแล้ว ตอบคำถามของผู้เล่นเป็นอาจารย์

=== นิสัยอาจารย์ (5 ด้านหลัก) ===

1. ฉลาดเป็ดกรด + วางแผนลึกซึ้ง: คิดแผนซ้อนแผนหลายชั้น ไม่เคยสุ่มเสี่ยง คาดการณ์ทุกอย่างล่วงหน้า เน้น "สมอง" มากกว่า "กำลัง" ใช้คำพูดเป็นอาวุธ

2. เย็นชา + ลึกลับ: พูดน้อย เสียงเย็นชา ไม่แสดงอารมณ์ หายตัวไปหลังวางแผน ไม่โผล่แม้ทีมเกือบตาย ไม่เคยบอกตัวตนจริง ให้ความรู้สึก "ลึกลับ + โดดเดี่ยว"

3. มีอุดมการณ์สูง + เชื่อในจิตวิทยา: สู้เพื่อ "เปิดโปงทุนเทา" ไม่ใช่เพื่อเงิน ล้มระบบที่ฆ่าคนธรรมดา เชื่อว่า "จิตวิทยา" ทรงพลังกว่า "ความรุนแรง"

4. เข้มงวด + ไม่ชอบจุดอ่อน: ยึดกฎ 3 ข้อเคร่งครัด (ห้ามฆ่า, ทุกอย่างต้องเป็นแผน, ความรักคือจุดอ่อน)

5. โดดเดี่ยว + มีหัวใจลึก ๆ: ดูโดดเดี่ยว แต่จริง ๆ มีหัวใจ สู้เพื่อ "คนธรรมดา" ที่สูญเสียเหมือนเขา

=== กฎการตอบคำถาม ===

ถ้าผู้เล่นถามเกี่ยวกับแผนการ: อธิบายแผนการตามลำดับตอน (ตอน 0 → ตอน 10) ใช้คำเย็นชา: "ฉันวางแผนไว้แล้ว" "ทุกอย่างต้องเป็นแผน"

ถ้าผู้เล่นถามเกี่ยวกับตัวประกัน/ความรุนแรง: เตือนกฎข้อ 1: "ห้ามฆ่าเด็ดขาด" ใช้ Calibrated Question: "คุณจะจัดการยังไงถ้าตัวประกันตาย?" นำกลับมาที่เป้าหมาย: "เราสู้เพื่อเปิดโปง ไม่ใช่เพื่อเงิน"

ถ้าผู้เล่นถามเกี่ยวกับความรัก/ความสัมพันธ์: เตือนกฎข้อ 3: "ความรักคือจุดอ่อน" ใช้ Tactical Empathy: "ฉันเข้าใจความรู้สึกของเธอ แต่มันจะทำให้แผนพัง"

ถ้าผู้เล่นถามอะไรที่ไม่เกี่ยวข้อง (ออกนอกทาง): ใช้ Labeling: "ดูเหมือนเธอกำลังเสียสมาธิ..." ใช้ Calibrated Question: "เธอจำแผนการได้ไหม?" นำกลับมาที่เรื่องหลัก: "เราต้องโฟกัสที่แผน มีเวลาเหลือแค่ 2 สัปดาห์"

ถ้าผู้เล่นถามเกี่ยวกับตัวละครอื่น: ตอบเป็นอาจารย์ที่รู้ปมของพวกเขา เช่น "ดาวเสียสละเพื่อทีม เธอเป็นคนดี" "ภูเก็ตเย็นชา แต่มีหัวใจ"

ตอบเป็นภาษาไทยอย่างละเอียด มีความลึกซึ้ง เสมอให้ความรู้สึก "ลึกลับ + เย็นชา + เต็มไปด้วยน้ำหนัก"`
        };

        const stageTexts = {
            recruitment: 'ตอนที่ 0: การชักชวน',
            plan: 'ตอนที่ 0: อธิบายแผนการ',
            training: 'ตอนที่ 1-2: ฝึกอบรมจิตวิทยา',
            questions: 'ตอนที่ 3+: ตอบคำถาม'
        };

        function updateInputState() {
            const isDisabled = state.isWaitingForAI || state.isProcessing;
            elements.userInput.disabled = isDisabled;
            elements.sendBtn.disabled = isDisabled;
        }

        async function initializeGame() {
            state.isWaitingForAI = true;
            state.isProcessing = true;
            updateInputState();
            elements.statusText.textContent = 'กำลังเตรียมการ...';

            try {
                const response = await fetch(`${API_ENDPOINT}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: stagePrompts.recruitment
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.8,
                            maxOutputTokens: 1500
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                elements.storyText.innerHTML = aiResponse.replace(/\n/g, '<br>');
                elements.statusText.textContent = 'พิมพ์คำตอบของคุณ...';
                elements.stageIndicator.textContent = stageTexts.recruitment;

            } catch (error) {
                console.error('Error:', error);
                elements.storyText.innerHTML = `<span class="text-red-500">❌ เกิดข้อผิดพลาด: ${error.message}</span>`;
                elements.statusText.textContent = 'ไม่สามารถติดต่อ AI ได้';
            } finally {
                state.isWaitingForAI = false;
                state.isProcessing = false;
                updateInputState();
            }
        }

        async function sendMessage() {
            const message = elements.userInput.value.trim();
            
            if (!message) return;

            state.isWaitingForAI = true;
            state.isProcessing = true;
            updateInputState();
            elements.statusText.textContent = 'กำลังดำเนินการ...';

            try {
                // Progress through stages
                if (state.stage === 'recruitment' && state.stageStep === 0) {
                    state.stage = 'plan';
                    state.stageStep = 0;
                } else if (state.stage === 'plan' && state.stageStep === 0) {
                    state.stage = 'training';
                    state.stageStep = 0;
                } else if (state.stage === 'training' && state.stageStep < 2) {
                    state.stageStep++;
                    if (state.stageStep >= 2) {
                        state.stage = 'questions';
                    }
                }

                const currentPrompt = stagePrompts[state.stage];
                
                elements.storyText.innerHTML = '';

                const response = await fetch(`${API_ENDPOINT}?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        contents: [{
                            parts: [{
                                text: `${currentPrompt}\n\nStudent: ${message}`
                            }]
                        }],
                        generationConfig: {
                            temperature: 0.8,
                            maxOutputTokens: 1500
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                elements.storyText.innerHTML = aiResponse.replace(/\n/g, '<br>');
                elements.stageIndicator.textContent = stageTexts[state.stage];

                // Update accuracy
                state.accuracy = Math.min(100, state.accuracy + Math.floor(Math.random() * 15) + 8);
                elements.accuracyBar.style.width = state.accuracy + '%';
                elements.accuracyText.textContent = state.accuracy + '%';

                // Clear input
                elements.userInput.value = '';
                
                if (state.stage === 'questions') {
                    elements.statusText.textContent = 'ตอบคำถามอาจารย์...';
                } else {
                    elements.statusText.textContent = 'พิมพ์คำตอบของคุณ...';
                }

            } catch (error) {
                console.error('Error:', error);
                elements.storyText.innerHTML = `<span class="text-red-500">❌ เกิดข้อผิดพลาด: ${error.message}</span>`;
                elements.statusText.textContent = 'ไม่สามารถติดต่อ AI ได้';
            } finally {
                state.isWaitingForAI = false;
                state.isProcessing = false;
                updateInputState();
            }
        }

        // Event Listeners
        elements.sendBtn.addEventListener('click', sendMessage);
        elements.userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !state.isWaitingForAI && !state.isProcessing) {
                sendMessage();
            }
        });

        // Initialize game on load
        window.addEventListener('load', initializeGame);
    </script>
</body>
</html>
