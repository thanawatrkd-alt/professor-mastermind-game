<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE BLOODCAR: POLICE HACK</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 1rem; }
        
        /* Header */
        .header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff1744 0%, #ff6e40 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 23, 68, 0.3);
        }

        /* Guide Box */
        .guide-box {
            background: rgba(255, 110, 64, 0.1);
            border: 1px dashed #ff6e40;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            animation: fadeIn 1s ease-in;
        }
        .guide-icon { font-size: 1.5rem; }
        .guide-text { font-size: 0.9rem; color: #ffb74d; line-height: 1.4; }

        /* Terminal */
        .terminal-window {
            display: none;
            background: #000;
            border: 1px solid #0f0;
            border-radius: 8px;
            padding: 1rem;
            color: #0f0;
            margin-bottom: 1.5rem;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
            max-height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
        }
        .terminal-window.active { display: block; }
        .terminal-window.police-mode { border-color: #00f; color: #0af; box-shadow: 0 0 15px rgba(0, 100, 255, 0.3); }

        /* Story Container */
        .story-container {
            background: rgba(22, 33, 62, 0.7);
            border-left: 4px solid #ff1744;
            border-radius: 8px;
            padding: 1.5rem;
            min-height: 150px;
            max-height: 350px;
            overflow-y: auto;
            backdrop-filter: blur(10px);
            margin-bottom: 1.5rem;
        }
        .story-text { line-height: 1.8; white-space: pre-wrap; }

        /* Input & Buttons */
        #user-input {
            flex: 1;
            background: rgba(10, 14, 39, 0.8);
            border: 1px solid #ff1744;
            border-radius: 4px;
            padding: 0.8rem;
            color: #fff;
        }
        .btn-primary {
            background: #ff1744;
            color: #fff;
            padding: 0.8rem 1.5rem;
            border-radius: 4px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary:hover { background: #d32f2f; transform: scale(1.05); }

        /* Choices */
        .choice-btn {
            background: rgba(255, 23, 68, 0.1);
            border: 1px solid rgba(255, 23, 68, 0.3);
            padding: 0.8rem;
            border-radius: 4px;
            text-align: left;
            transition: 0.3s;
            margin-bottom: 0.5rem;
            width: 100%;
        }
        .choice-btn:hover { background: rgba(255, 23, 68, 0.2); border-color: #ff1744; }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 1rem;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #16213e;
            border: 2px solid #ff1744;
            padding: 2rem;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="flex justify-between items-center mb-8">
            <div class="header">
                <h1>THE BLOODCAR</h1>
                <p class="text-xs tracking-widest text-gray-400">POLICE DATABASE HACK v2.3</p>
            </div>
            <div class="flex gap-2">
                <button onclick="openApiModal()" class="text-xs border border-red-500 px-2 py-1 rounded hover:bg-red-500 transition">API KEY</button>
                <button onclick="resetGame()" class="text-xs border border-gray-500 px-2 py-1 rounded hover:bg-gray-500 transition">RESET</button>
            </div>
        </header>

        <!-- Guide System -->
        <div id="guide-box" class="guide-box">
            <div class="guide-icon">💡</div>
            <div class="guide-text" id="guide-text">ยินดีต้อนรับ! ผมคือ Game Master ของคุณ ผมจะคอยแนะนำขั้นตอนต่างๆ ให้เองครับ</div>
        </div>

        <div id="terminal" class="terminal-window">
            <div id="terminal-content"></div>
        </div>

        <div class="story-container">
            <div id="stage-badge" class="text-[10px] bg-red-600 text-white px-2 py-0.5 rounded inline-block mb-2 uppercase font-bold">STAGE 0: INTRO</div>
            <div id="story-text" class="story-text">กำลังโหลดเนื้อเรื่อง...</div>
        </div>

        <div class="flex gap-2 mb-6">
            <input type="text" id="user-input" placeholder="พิมพ์คำสั่งหรือการตัดสินใจของคุณที่นี่...">
            <button id="send-btn" class="btn-primary">ส่ง</button>
        </div>

        <div id="choices-section" class="hidden">
            <p class="text-xs text-gray-500 mb-2 uppercase font-bold">คำแนะนำการตัดสินใจ:</p>
            <div id="choices-container"></div>
        </div>

        <p id="status-text" class="text-center text-[10px] text-gray-500 mt-4"></p>
    </div>

    <!-- API Modal -->
    <div id="api-modal" class="modal">
        <div class="modal-content">
            <h2 class="text-xl font-bold text-red-500 mb-4">🔑 ตั้งค่า API KEY</h2>
            <p class="text-xs text-gray-400 mb-4">เลือก Provider และใส่ Key เพื่อเริ่มเล่น (แนะนำ Groq เพราะเร็วและฟรี)</p>
            <select id="api-provider" class="w-full bg-gray-900 border border-red-500 p-2 rounded mb-4 text-white">
                <option value="groq">Groq (Llama 3.3)</option>
                <option value="gemini">Google Gemini</option>
            </select>
            <input type="text" id="api-key" placeholder="ป้อน API Key ของคุณ..." class="w-full bg-gray-900 border border-red-500 p-2 rounded mb-6 text-white">
            <div class="flex justify-end gap-2">
                <button onclick="closeApiModal()" class="px-4 py-2 text-gray-400">ยกเลิก</button>
                <button onclick="saveApiKey()" class="bg-red-600 px-6 py-2 rounded font-bold">บันทึก</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            stage: 'intro',
            history: [],
            apiKey: localStorage.getItem('bloodcar_key') || '',
            provider: localStorage.getItem('bloodcar_provider') || 'groq',
            isWaiting: false
        };

        const stageOrder = ['intro', 'planning', 'police_hack', 'recruitment', 'rehearsal', 'heist_begin', 'heist_crisis', 'ai_awakens', 'betrayal', 'final_heist', 'escape', 'epilogue'];

        const guides = {
            intro: "ยินดีต้อนรับ! คุณคือ 'เอก' วิศวกรที่ถูกหักหลัง ตอนนี้คุณกำลังสร้าง BLOODCAR รถบังคับ AI เพื่อล้างแค้น ลองเลือก 'เริ่มเขียนโค้ด' เพื่อเริ่มแผนการของคุณสิครับ",
            planning: "ยอดเยี่ยม! ขั้นตอนต่อไปคือการวางแผน คุณต้องเลือกว่าจะเน้นที่ 'การแฮ็กระบบ' หรือ 'การปรับแต่งรถ' ลองพิมพ์คำสั่งแฮ็กดูสิ เช่น python3 exploit.py",
            police_hack: "🚨 ตอนนี้คุณต้องแฮ็กเข้าคอมพิวเตอร์ตำรวจ! เพื่อขโมยแผนผังธนาคารและลบประวัติของคุณ ลองใช้คำสั่ง ssh admin@police-hq หรือลบหมายจับด้วย rm -rf /records/warrants",
            recruitment: "การปล้นครั้งนี้ทำคนเดียวไม่ได้ คุณต้องหาทีม! ผมแนะนำให้ลองชวน 'มิ้น' แฮ็กเกอร์ฝีมือดี หรือ 'บิ๊ก' นักแข่งรถใต้ดินดูครับ",
            heist_begin: "ปฏิบัติการเริ่มแล้ว! BLOODCAR อยู่หน้าธนาคารแล้ว ตอนนี้คุณต้องสั่งการแฮ็กประตูนิรภัย ลองใช้คำสั่ง bloodcar --bypass-gate ดูครับ",
            heist_crisis: "แย่แล้ว! ระบบป้องกันทำงาน BLOODCAR เริ่มมีท่าทีแปลกๆ คุณต้องตัดสินใจด่วนว่าจะ 'กู้ระบบ' หรือ 'ปล่อยให้ AI จัดการเอง'"
        };

        const defaultChoices = {
            intro: [
                { text: "💻 เริ่มเขียนโค้ด AI สำหรับ BLOODCAR", value: "ฉันเริ่มเขียนโค้ด AI ทันทีเพื่อเตรียมการปล้น" },
                { text: "😤 วางแผนล้างแค้นบริษัทเก่า", value: "ฉันจะเริ่มจากการรวบรวมข้อมูลของธนาคารที่บริษัทเก่าใช้" }
            ],
            planning: [
                { text: "⌨️ เขียน exploit.py เพื่อแฮ็กระบบธนาคาร", value: "python3 exploit.py --target apex-bank" },
                { text: "🔍 ค้นหาช่องโหว่ในเครือข่ายตำรวจ", value: "ฉันจะลองแฮ็กเข้าคอมพิวเตอร์ตำรวจเพื่อขโมยข้อมูล" }
            ],
            police_hack: [
                { text: "🕵️ แฮ็กฐานข้อมูลหมายจับ (Warrants)", value: "ssh admin@police-hq && rm -rf /records/warrants" },
                { text: "🗺️ ขโมยแผนผังธนาคารจากคลังข้อมูลตำรวจ", value: "download --file /secure/bank-blueprints.pdf" },
                { text: "📡 แฮ็กกล้องวงจรปิดรอบเมือง", value: "access --cameras --city-center" }
            ],
            heist_begin: [
                { text: "🔓 สั่ง BLOODCAR แฮ็กประตูนิรภัย", value: "bloodcar --bypass-gate" },
                { text: "📸 สั่งปิดระบบกล้องวงจรปิด", value: "disable --camera all" }
            ]
        };

        function updateUI() {
            document.getElementById('stage-badge').textContent = `STAGE ${stageOrder.indexOf(state.stage)}: ${state.stage.toUpperCase()}`;
            document.getElementById('guide-text').textContent = guides[state.stage] || "ดำเนินเนื้อเรื่องต่อไปตามที่คุณต้องการได้เลยครับ ผมพร้อมสนับสนุน!";
            showChoices();
        }

        function showChoices() {
            const container = document.getElementById('choices-container');
            const section = document.getElementById('choices-section');
            container.innerHTML = '';
            const choices = defaultChoices[state.stage] || [];
            if (choices.length > 0) {
                section.classList.remove('hidden');
                choices.forEach(c => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = c.text;
                    btn.onclick = () => {
                        document.getElementById('user-input').value = c.value;
                        sendMessage();
                    };
                    container.appendChild(btn);
                });
            } else {
                section.classList.add('hidden');
            }
        }

        function showTerminal(lines, mode = 'normal') {
            const term = document.getElementById('terminal');
            const content = document.getElementById('terminal-content');
            term.classList.add('active');
            if (mode === 'police') term.classList.add('police-mode');
            else term.classList.remove('police-mode');
            
            content.innerHTML = '';
            lines.forEach((line, i) => {
                setTimeout(() => {
                    const div = document.createElement('div');
                    div.textContent = `> ${line}`;
                    content.appendChild(div);
                    term.scrollTop = term.scrollHeight;
                }, i * 600);
            });
        }

        async function callAI(prompt) {
            if (!state.apiKey) { openApiModal(); return; }
            document.getElementById('status-text').textContent = "⏳ AI กำลังคิดคำตอบ...";
            try {
                let responseText = "";
                const systemPrompt = `คุณเป็น Game Master ของเกม THE BLOODCAR (ธีมปล้นธนาคารด้วยรถบังคับ AI) 
                หน้าที่ของคุณ:
                1. เล่าเรื่องให้ตื่นเต้น เร้าใจ
                2. คอยแนะนำผู้เล่น (Guide) ว่าควรทำอะไรต่อไป
                3. ถ้าผู้เล่นพิมพ์คำสั่งแฮ็ก ให้ตอบสนองแบบแฮ็กเกอร์
                4. ในตอน 'Police Hack' ให้เน้นความเสี่ยงจากการถูกตำรวจจับ
                5. ใช้ภาษาไทยที่ทันสมัยและน่าติดตาม`;

                if (state.provider === 'groq') {
                    const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${state.apiKey}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            model: 'llama-3.3-70b-versatile',
                            messages: [{ role: 'system', content: systemPrompt }, ...state.history, { role: 'user', content: prompt }]
                        })
                    });
                    const data = await res.json();
                    responseText = data.choices[0].message.content;
                } else {
                    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${state.apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: systemPrompt + "\n\n" + prompt }] }] })
                    });
                    const data = await res.json();
                    responseText = data.candidates[0].content.parts[0].text;
                }
                state.history.push({ role: 'user', content: prompt }, { role: 'assistant', content: responseText });
                return responseText;
            } catch (e) {
                return "❌ เกิดข้อผิดพลาดในการเชื่อมต่อ AI กรุณาตรวจสอบ API Key";
            } finally {
                document.getElementById('status-text').textContent = "";
            }
        }

        async function sendMessage() {
            const input = document.getElementById('user-input');
            const msg = input.value.trim();
            if (!msg || state.isWaiting) return;

            state.isWaiting = true;
            input.value = '';

            // Hacking simulation
            if (msg.includes('police') || msg.includes('admin@police') || msg.includes('rm -rf')) {
                showTerminal([
                    "CONNECTING TO POLICE-HQ...",
                    "BYPASSING FIREWALL...",
                    "WARNING: TRACE DETECTED (15%)",
                    "ACCESS GRANTED: /records/warrants",
                    "DELETING FILES... SUCCESS"
                ], 'police');
            } else if (msg.includes('.') || msg.includes('--') || msg.includes('python')) {
                showTerminal([`RUNNING: ${msg}`, "CONNECTING TO BLOODCAR...", "BYPASSING FIREWALL...", "SUCCESS: ACCESS GRANTED"]);
            }

            const currentIdx = stageOrder.indexOf(state.stage);
            if (currentIdx < stageOrder.length - 1) state.stage = stageOrder[currentIdx + 1];
            
            const response = await callAI(msg);
            document.getElementById('story-text').innerHTML = response.replace(/\n/g, '<br>');
            updateUI();
            state.isWaiting = false;
        }

        function openApiModal() { document.getElementById('api-modal').classList.add('active'); }
        function closeApiModal() { document.getElementById('api-modal').classList.remove('active'); }
        function saveApiKey() {
            state.apiKey = document.getElementById('api-key').value.trim();
            state.provider = document.getElementById('api-provider').value;
            localStorage.setItem('bloodcar_key', state.apiKey);
            localStorage.setItem('bloodcar_provider', state.provider);
            closeApiModal();
            if (state.apiKey) startGame();
        }

        async function startGame() {
            const response = await callAI("เริ่มเกม THE BLOODCAR และแนะนำตัวละครเอก");
            document.getElementById('story-text').innerHTML = response.replace(/\n/g, '<br>');
            updateUI();
        }

        function resetGame() {
            if (confirm("ต้องการเริ่มเกมใหม่ทั้งหมดใช่หรือไม่?")) {
                state.stage = 'intro';
                state.history = [];
                startGame();
            }
        }

        document.getElementById('send-btn').onclick = sendMessage;
        document.getElementById('user-input').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(); };

        window.onload = () => { if (state.apiKey) startGame(); else openApiModal(); };
    </script>
</body>
</html>
