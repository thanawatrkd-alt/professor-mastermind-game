<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รถบังคับสีเลือด</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0e27 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Courier New', monospace;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem;
        }

        @media (min-width: 768px) {
            .container {
                padding: 2rem;
            }
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 2rem;
            animation: slideDown 0.8s ease-out;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff1744 0%, #ff6e40 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 23, 68, 0.5);
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            .header h1 {
                font-size: 3.5rem;
            }
        }

        .header p {
            font-size: 0.85rem;
            color: #b0bec5;
            letter-spacing: 2px;
        }

        @media (min-width: 768px) {
            .header p {
                font-size: 1.2rem;
                letter-spacing: 3px;
            }
        }

        /* Stage Indicator */
        .stage-indicator {
            text-align: center;
            margin-bottom: 1.5rem;
            animation: fadeIn 0.6s ease-in;
        }

        .stage-badge {
            display: inline-block;
            background: linear-gradient(135deg, #ff1744 0%, #d32f2f 100%);
            color: white;
            padding: 0.75rem 1.5rem;
            border-radius: 50px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
            border: 2px solid rgba(255, 23, 68, 0.6);
        }

        /* Story Container */
        .story-section {
            margin-bottom: 2rem;
            animation: slideUp 0.8s ease-out 0.4s both;
        }

        .story-container {
            background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(22, 33, 62, 0.9) 100%);
            border: 2px solid rgba(255, 23, 68, 0.4);
            border-left: 6px solid #ff1744;
            border-radius: 12px;
            padding: 2rem;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            position: relative;
        }

        .story-text {
            font-size: 1.05rem;
            line-height: 2;
            color: #e0e0e0;
            letter-spacing: 0.5px;
            word-spacing: 2px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .story-text::first-letter {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff6e40;
        }

        /* Markdown-like styling */
        .story-text strong,
        .story-text b {
            color: #ff6e40;
            font-weight: bold;
        }

        .story-text em,
        .story-text i {
            color: #ffb74d;
            font-style: italic;
        }

        .story-text code {
            background: rgba(255, 23, 68, 0.2);
            color: #ff6e40;
            padding: 0.2rem 0.4rem;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
        }

        .story-text pre {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 6px;
            overflow-x: auto;
            margin: 0.5rem 0;
            border-left: 3px solid #ff1744;
        }

        .story-text pre code {
            background: none;
            color: #ffb74d;
            padding: 0;
        }

        .story-text h1,
        .story-text h2,
        .story-text h3,
        .story-text h4,
        .story-text h5,
        .story-text h6 {
            color: #ff6e40;
            font-weight: bold;
            margin: 1rem 0 0.5rem 0;
        }

        .story-text h1 { font-size: 1.4rem; }
        .story-text h2 { font-size: 1.3rem; }
        .story-text h3 { font-size: 1.2rem; }
        .story-text h4 { font-size: 1.1rem; }
        .story-text h5 { font-size: 1rem; }
        .story-text h6 { font-size: 0.95rem; }

        .story-text ul,
        .story-text ol {
            margin: 0.5rem 0 0.5rem 1.5rem;
            padding: 0;
        }

        .story-text li {
            margin: 0.3rem 0;
            color: #e0e0e0;
        }

        .story-text blockquote {
            border-left: 4px solid #ff1744;
            padding-left: 1rem;
            margin: 0.5rem 0;
            color: #ffb74d;
            font-style: italic;
        }

        .story-text hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff1744, transparent);
            margin: 1rem 0;
        }

        .story-text p {
            margin: 0.5rem 0;
        }

        .story-container:hover .story-text {
            cursor: pointer;
        }

        .story-container::before {
            content: '💡 คลิกเพื่อข้ามการพิมพ์';
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            font-size: 0.75rem;
            color: #ffb74d;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .story-container:hover::before {
            opacity: 1;
        }

        /* Scrollbar Styling */
        .story-container::-webkit-scrollbar {
            width: 8px;
        }

        .story-container::-webkit-scrollbar-track {
            background: rgba(255, 23, 68, 0.1);
            border-radius: 10px;
        }

        .story-container::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff1744 0%, #ff6e40 100%);
            border-radius: 10px;
        }

        .story-container::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ff6e40 0%, #ffb74d 100%);
        }

        /* Input Section */
        .input-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            animation: slideUp 0.8s ease-out 0.6s both;
        }

        #user-input {
            flex: 1;
            background: rgba(22, 33, 62, 0.8);
            color: #e0e0e0;
            border: 2px solid rgba(255, 23, 68, 0.4);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            font-size: 1rem;
            font-family: 'Courier New', monospace;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        #user-input::placeholder {
            color: #666;
        }

        #user-input:focus {
            outline: none;
            border-color: #ff1744;
            box-shadow: 0 0 20px rgba(255, 23, 68, 0.5), inset 0 0 10px rgba(255, 23, 68, 0.1);
            background: rgba(22, 33, 62, 0.95);
        }

        #send-btn {
            background: linear-gradient(135deg, #ff1744 0%, #d32f2f 100%);
            color: white;
            border: none;
            padding: 1rem 2.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        #send-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, #ff6e40 0%, #ff1744 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(255, 23, 68, 0.6);
        }

        #send-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        #send-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: linear-gradient(135deg, #666 0%, #444 100%);
        }

        /* Status Text */
        .status-text {
            text-align: center;
            font-size: 0.95rem;
            color: #b0bec5;
            min-height: 1.5rem;
            animation: slideUp 0.8s ease-out 0.8s both;
        }

        /* Header Buttons */
        .header-btn {
            background: linear-gradient(135deg, #ff1744 0%, #d32f2f 100%);
            color: white;
            border: 2px solid rgba(255, 23, 68, 0.6);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
            position: relative;
            z-index: 100;
        }

        .header-btn:hover {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.4) 0%, rgba(255, 110, 64, 0.4) 100%);
            border-color: #ff1744;
            transform: translateY(-1px);
        }

        .header-btn:active {
            transform: translateY(0);
        }

        /* Help Buttons */
        .help-buttons {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            justify-content: center;
            animation: slideUp 0.8s ease-out 0.7s both;
        }

        .help-btn {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.2) 0%, rgba(255, 110, 64, 0.2) 100%);
            color: #ffb74d;
            border: 2px solid rgba(255, 23, 68, 0.4);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .help-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.4) 0%, rgba(255, 110, 64, 0.4) 100%);
            border-color: #ff1744;
            transform: translateY(-1px);
        }

        /* API Modal */
        .api-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .api-modal.active {
            display: flex;
        }

        .api-modal-content {
            background: linear-gradient(135deg, #0f3460 0%, #16213e 100%);
            border: 2px solid rgba(255, 23, 68, 0.6);
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
        }

        .api-modal-content h2 {
            color: #ff6e40;
            font-size: 1.5rem;
            margin-bottom: 1rem;
            text-align: center;
        }

        .api-modal-content p {
            color: #b0bec5;
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }

        .api-modal-content input,
        .api-modal-content select {
            width: 100%;
            padding: 0.75rem 1rem;
            background: rgba(22, 33, 62, 0.8);
            color: #e0e0e0;
            border: 2px solid rgba(255, 23, 68, 0.4);
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: 'Courier New', monospace;
            margin-bottom: 1rem;
            transition: border-color 0.3s ease;
        }

        .api-modal-content input:focus,
        .api-modal-content select:focus {
            outline: none;
            border-color: #ff1744;
        }

        .api-modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .api-modal-buttons button {
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }

        .api-modal-buttons .cancel-btn {
            background: rgba(255, 255, 255, 0.1);
            color: #b0bec5;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .api-modal-buttons .cancel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .api-modal-buttons .save-btn {
            background: linear-gradient(135deg, #ff1744 0%, #d32f2f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }

        .api-modal-buttons .save-btn:hover {
            background: linear-gradient(135deg, #ff6e40 0%, #ff1744 100%);
            transform: translateY(-1px);
        }

        /* Animations */
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes blink {
            0%, 49% {
                opacity: 1;
            }
            50%, 100% {
                opacity: 0;
            }
        }

        .cursor {
            display: inline;
            animation: blink 1s infinite;
            color: #ff1744;
            font-weight: bold;
        }

        /* Choice Buttons */
        .choices-section {
            display: none;
            margin-top: 1.5rem;
            animation: slideUp 0.8s ease-out;
        }

        .choices-section.active {
            display: block;
        }

        .choices-label {
            font-size: 0.9rem;
            color: #ffb74d;
            margin-bottom: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .choices-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }

        .choice-btn {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.3) 0%, rgba(255, 110, 64, 0.3) 100%);
            color: #e0e0e0;
            border: 2px solid rgba(255, 23, 68, 0.5);
            padding: 1rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: left;
            backdrop-filter: blur(10px);
            word-break: break-word;
        }

        .choice-btn:hover:not(:disabled) {
            background: linear-gradient(135deg, rgba(255, 23, 68, 0.5) 0%, rgba(255, 110, 64, 0.5) 100%);
            border-color: #ff1744;
            transform: translateX(5px);
            box-shadow: 0 4px 15px rgba(255, 23, 68, 0.4);
        }

        .choice-btn:active:not(:disabled) {
            transform: translateX(3px);
        }

        .choice-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @media (min-width: 768px) {
            .choices-container {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .choices-container {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        /* Suggestions Section */
        .suggestions-section {
            margin-top: 1rem;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .choices-container {
                grid-template-columns: 1fr;
            }

            .choice-btn {
                padding: 0.85rem 1.25rem;
                font-size: 0.9rem;
            }
            .header {
                margin-bottom: 1rem;
            }

            .header > div {
                flex-direction: column !important;
                gap: 0.75rem !important;
            }

            .header > div > div:last-child {
                display: flex;
                gap: 0.25rem;
                justify-content: center;
                flex-wrap: wrap;
            }

            .header-btn {
                padding: 0.4rem 0.75rem;
                font-size: 0.7rem;
            }

            .stage-badge {
                font-size: 0.8rem;
                padding: 0.5rem 1rem;
            }

            .story-container {
                min-height: 150px;
                max-height: 300px;
                padding: 1rem;
                margin-bottom: 1rem;
            }

            .story-text {
                font-size: 0.95rem;
                line-height: 1.8;
            }

            .story-text h1 { font-size: 1.2rem; }
            .story-text h2 { font-size: 1.1rem; }
            .story-text h3 { font-size: 1rem; }
            .story-text h4 { font-size: 0.95rem; }
            .story-text h5 { font-size: 0.9rem; }
            .story-text h6 { font-size: 0.85rem; }

            .input-section {
                flex-direction: column;
                gap: 0.75rem;
                margin-bottom: 1rem;
            }

            #user-input {
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }

            #send-btn {
                width: 100%;
                padding: 0.75rem 1.5rem;
                font-size: 0.9rem;
            }

            .help-buttons {
                flex-direction: column;
                gap: 0.75rem;
            }

            .help-btn {
                width: 100%;
                padding: 0.65rem 1rem;
                font-size: 0.85rem;
            }

            .api-modal-content {
                width: 95%;
                padding: 1.5rem;
            }

            .api-modal-content h2 {
                font-size: 1.2rem;
                margin-bottom: 0.75rem;
            }

            .api-modal-content p {
                font-size: 0.8rem;
                margin-bottom: 1rem;
            }

            .api-modal-content input {
                padding: 0.65rem 0.75rem;
                font-size: 0.85rem;
                margin-bottom: 0.75rem;
            }

            .api-modal-buttons {
                flex-direction: column;
                gap: 0.5rem;
            }

            .api-modal-buttons button {
                padding: 0.65rem 1rem;
                font-size: 0.85rem;
                width: 100%;
            }

            .status-text {
                font-size: 0.85rem;
            }
        }

        @media (min-width: 641px) and (max-width: 1024px) {
            .header > div {
                flex-direction: column !important;
                gap: 1rem !important;
            }

            .header > div > div:last-child {
                display: flex;
                gap: 0.5rem;
                justify-content: center;
                flex-wrap: wrap;
            }

            .header-btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }

            .story-container {
                min-height: 180px;
                max-height: 350px;
            }

            .input-section {
                gap: 0.75rem;
            }
        }

        @media (min-width: 1025px) {
            .header > div {
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            .header > div > div:last-child {
                display: flex;
                gap: 0.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div>
                <div>
                    <h1>🚗 THE BLOODCAR</h1>
                    <p>AUTONOMOUS HEIST NIGHTMARE v2.0</p>
                </div>
                <div>
                    <button id="api-btn" class="header-btn" title="ตั้งค่า API Key" onclick="openApiModal()">🔑 API</button>
                    <button id="save-btn" class="header-btn" title="บันทึกเกม">💾 บันทึก</button>
                    <button id="load-btn" class="header-btn" title="โหลดเกม">📂 โหลด</button>
                    <button id="reset-btn" class="header-btn" title="เริ่มใหม่">🔄 เริ่มใหม่</button>
                </div>
            </div>
        </div>

        <!-- Stage Indicator -->
        <div class="stage-indicator">
            <span class="stage-badge" id="stage-text">ตอนที่ 0: จุดเริ่มต้น</span>
        </div>

        <!-- Story Container -->
        <div class="story-section">
            <div class="story-container">
                <p class="story-text" id="story-text">กำลังเตรียมการ...</p>
            </div>
        </div>

        <!-- Input Section -->
        <div class="input-section">
            <input 
                type="text" 
                id="user-input" 
                placeholder="พิมพ์การตัดสินใจของคุณ..." 
            >
            <button id="send-btn">ส่ง</button>
        </div>

        <!-- Help Buttons -->
        <div id="help-buttons" class="help-buttons" style="display: none;">
            <button id="think-btn" class="help-btn think-btn">💭 ให้ฉันคิด</button>
            <button id="hint-btn" class="help-btn hint-btn">💡 บอกใจความ</button>
        </div>

        <!-- Choices Section -->
        <div id="choices-section" class="choices-section">
            <div class="choices-label">📋 เลือกการตัดสินใจของคุณ:</div>
            <div id="choices-container" class="choices-container"></div>
        </div>

        <!-- Suggestions Section -->
        <div id="suggestions-section" class="suggestions-section" style="display: none;">
            <div class="choices-label">💡 ลองถามเรื่องนี้:</div>
            <div id="suggestions-container" style="display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem;"></div>
        </div>

        <!-- Status Text -->
        <p id="status-text" class="status-text"></p>
    </div>

    <!-- API Key Modal -->
    <div id="api-modal" class="api-modal">
        <div class="api-modal-content">
            <h2>🔑 ตั้งค่า API Key</h2>
            <div style="margin-bottom: 1rem;">
                <label style="display: block; margin-bottom: 0.5rem; font-weight: bold;">เลือก AI Provider:</label>
                <select id="api-provider-select" style="width: 100%; padding: 0.5rem; background: #1a2332; color: #e0e0e0; border: 1px solid #ff1744; border-radius: 6px;">
                    <option value="gemini">🔵 Google Gemini</option>
                    <option value="deepseek">🟢 DeepSeek</option>
                    <option value="claude">🟣 Anthropic Claude</option>
                    <option value="groq">⚡ Groq (ฟรี)</option>
                </select>
            </div>
            
            <div id="provider-info">
                <p id="provider-description">กรุณาป้อน API Key ของคุณ:</p>
                <p id="provider-link" style="font-size: 0.85rem; color: #ff6e40;"></p>
                <input 
                    type="text" 
                    id="unified-api-key-input" 
                    placeholder="ป้อน API Key..." 
                    style="width: 100%; padding: 0.75rem; background: #1a2332; color: #e0e0e0; border: 1px solid #ff1744; border-radius: 6px; margin-top: 0.5rem;"
                >
            </div>

        // ============================================================
        // Markdown Parser
        // ============================================================
        function parseMarkdown(text) {
            let html = text;
            
            html = html.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;');
            
            html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
            html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/_(.*?)_/g, '<em>$1</em>');
            html = html.replace(/`(.*?)`/g, '<code>$1</code>');
            html = html.replace(/^&gt; (.*?)$/gm, '<blockquote>$1</blockquote>');
            html = html.replace(/^\* (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^- (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*?<\/li>)/s, '<ul>$1</ul>');
            html = html.replace(/<\/ul>\s*<ul>/g, '');
            html = html.replace(/^\d+\. (.*?)$/gm, '<li>$1</li>');
            html = html.replace(/^---$/gm, '<hr>');
            html = html.replace(/^\*\*\*$/gm, '<hr>');
            html = html.replace(/^___$/gm, '<hr>');
            html = html.split('\n\n').map(p => {
                if (!p.match(/^<[^>]+>/)) {
                    p = '<p>' + p + '</p>';
                }
                return p;
            }).join('');
            
            return html;
        }

        // ============================================================
        function buildPrompt(stage, userInput) {
            const template = stagePrompts[stage] || stagePrompts.questions;
            return template.replace(/\{\{USER_INPUT\}\}/g, userInput || '');
        }

        // ============================================================
        // API Calls — Gemini
        // ============================================================
        async function callGeminiAPIStreaming(prompt, onChunk) {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:streamGenerateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: {
                        temperature: 0.8,
                        maxOutputTokens: 2000,
                        topP: 0.9,
                        topK: 40
                    }
                })
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Gemini API Error: ${data.error ? data.error.message : response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const json = JSON.parse(line.slice(6));
                                if (json.candidates?.[0]?.content?.parts?.[0]?.text) {
                                    const text = json.candidates[0].content.parts[0].text;
                                    fullText += text;
                                    onChunk(text);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }
            return fullText;
        }

        // ============================================================
        // API Calls — DeepSeek
        // ============================================================
        async function callDeepSeekAPIStreaming(prompt, onChunk) {
            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${DEEPSEEK_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: 'คุณเป็นนักเล่าเรื่องสำหรับเกม THE BLOODCAR ตอบเป็นภาษาไทยเท่านั้น' },
                        { role: 'user', content: prompt }
                    ],
                    temperature: 0.8,
                    max_tokens: 2000,
                    stream: true
                })
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(`DeepSeek API Error: ${data.error ? data.error.message : response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices?.[0]?.delta?.content || '';
                                if (content) {
                                    fullText += content;
                                    onChunk(content);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }
            return fullText;
        }

        // ============================================================
        // API Calls — Claude (Streaming via SSE)
        // ============================================================
        async function callClaudeAPIStreaming(prompt, onChunk) {
            const response = await fetch('https://api.anthropic.com/v1/messages', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'x-api-key': CLAUDE_API_KEY,
                    'anthropic-version': '2023-06-01',
                    'anthropic-dangerous-direct-browser-access': 'true'
                },
                body: JSON.stringify({
                    model: 'claude-3-5-haiku-20241022',
                    max_tokens: 2000,
                    stream: true,
                    system: 'คุณเป็นนักเล่าเรื่องสำหรับเกม THE BLOODCAR ตอบเป็นภาษาไทยเท่านั้น',
                    messages: [{ role: 'user', content: prompt }]
                })
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Claude API Error: ${data.error ? data.error.message : response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                if (json.type === 'content_block_delta' && json.delta?.text) {
                                    fullText += json.delta.text;
                                    onChunk(json.delta.text);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }
            return fullText;
        }

        // ============================================================
        // API Calls — Groq
        // ============================================================
        async function callGroqAPIStreaming(prompt, onChunk) {
            if (state.lastStage !== state.stage) {
                state.conversationHistory = [];
                state.lastStage = state.stage;
            }

            const messages = [
                {
                    role: 'system',
                    content: 'คุณเป็นนักเล่าเรื่องสำหรับเกม THE BLOODCAR เรื่องราวการปล้นธนาคารด้วยรถบังคับ AI ตอบเป็นภาษาไทยเท่านั้น ให้เรื่องราวน่าตื่นเต้น ลึกลับ และดึงดูด'
                },
                ...state.conversationHistory,
                { role: 'user', content: prompt }
            ];

            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${GROQ_API_KEY}`
                },
                body: JSON.stringify({
                    model: 'llama-3.3-70b-versatile',
                    messages: messages,
                    temperature: 0.8,
                    max_tokens: 2000,
                    top_p: 0.95,
                    stream: true
                })
            });

            if (!response.ok) {
                const data = await response.json();
                throw new Error(`Groq API Error: ${data.error ? data.error.message : response.status}`);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullText = '';

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = line.slice(6).trim();
                            if (data === '[DONE]') continue;
                            try {
                                const json = JSON.parse(data);
                                const content = json.choices?.[0]?.delta?.content || '';
                                if (content) {
                                    fullText += content;
                                    onChunk(content);
                                }
                            } catch (e) {}
                        }
                    }
                }
            } finally {
                reader.releaseLock();
            }

            if (fullText) {
                state.conversationHistory.push({ role: 'assistant', content: fullText });
            }
            return fullText;
        }

        // ============================================================
        // Unified Streaming Call
        // ============================================================
        async function callAIStreaming(prompt) {
            elements.storyText.innerHTML = '';
            let aiResponse = '';
            let displayedText = '';

            const onChunk = async (chunk) => {
                aiResponse += chunk;
                displayedText += chunk;
                elements.storyText.innerHTML = parseMarkdown(displayedText);
                scrollToBottom(elements.storyText.parentElement);
                if (API_PROVIDER === 'groq') {
                    await new Promise(resolve => setTimeout(resolve, 15));
                }
            };

            if (API_PROVIDER === 'gemini') {
                await callGeminiAPIStreaming(prompt, onChunk);
            } else if (API_PROVIDER === 'deepseek') {
                await callDeepSeekAPIStreaming(prompt, onChunk);
            } else if (API_PROVIDER === 'claude') {
                try {
                    await callClaudeAPIStreaming(prompt, onChunk);
                } catch (e) {
                    elements.storyText.innerHTML = '<span style="color: #ff6e40;">⚠️ Claude API อาจมีปัญหา CORS ลองใช้ Groq หรือ DeepSeek แทน</span>';
                }
            } else if (API_PROVIDER === 'groq') {
                state.conversationHistory.push({ role: 'user', content: prompt });
                await callGroqAPIStreaming(prompt, onChunk);
            }

            return aiResponse;
        }

        // ============================================================
        // Initialize Game (ตอนที่ 0: Intro)
        // ============================================================
        async function initializeGame() {
            let apiKey = getApiKey();
            if (!apiKey) {
                elements.statusText.textContent = '⚠️ กรุณาตั้งค่า API Key ก่อน';
                openApiModal();
                return;
            }

            state.isWaitingForAI = true;
            state.isProcessing = true;
            updateInputState();
            elements.statusText.textContent = '🎬 กำลังเตรียมเรื่องราว...';
            hideChoices();
            hideSuggestions();

            try {
                state.conversationHistory = [];
                state.lastStage = 'intro';
                state.stage = 'intro';
                
                elements.stageIndicator.textContent = stageTexts['intro'];
                
                await callAIStreaming(stagePrompts.intro);
                
                elements.statusText.textContent = '💬 พิมพ์การตัดสินใจของคุณ...';
                showDefaultChoices();
                saveGame(true);

            } catch (error) {
                console.error('Error:', error);
                elements.storyText.innerHTML = `<span style="color: #ff6e40;">❌ เกิดข้อผิดพลาด: ${error.message}</span>`;
                elements.statusText.textContent = '⚠️ ไม่สามารถติดต่อ AI ได้ กรุณาตรวจสอบ API Key';
            } finally {
                state.isWaitingForAI = false;
                state.isProcessing = false;
                updateInputState();
            }
        }

        // ============================================================
        // Get Current API Key
        // ============================================================
        function getApiKey() {
            if (API_PROVIDER === 'gemini') return API_KEY;
            if (API_PROVIDER === 'deepseek') return DEEPSEEK_API_KEY;
            if (API_PROVIDER === 'claude') return CLAUDE_API_KEY;
            if (API_PROVIDER === 'groq') return GROQ_API_KEY;
            return '';
        }

        // ============================================================
        // Advance Stage
        // ============================================================
        function advanceStage() {
            const currentIndex = stageOrder.indexOf(state.stage);
            if (currentIndex < stageOrder.length - 1) {
                state.stage = stageOrder[currentIndex + 1];
            }
            // Clear conversation history on stage change
            state.conversationHistory = [];
            state.lastStage = state.stage;
        }

        // ============================================================
        // Send Message (ผู้เล่นตัดสินใจ)
        // ============================================================
        async function sendMessage() {
            const message = elements.userInput.value.trim();
            if (!message) return;

            if (!getApiKey()) {
                elements.statusText.textContent = '⚠️ กรุณาตั้งค่า API Key ก่อน';
                openApiModal();
                return;
            }

            state.isWaitingForAI = true;
            state.isProcessing = true;
            updateInputState();
            elements.statusText.textContent = '⏳ กำลังดำเนินเรื่อง...';
            hideChoices();
            hideSuggestions();
            elements.userInput.value = '';

            try {
                // Advance to next stage
                advanceStage();
                elements.stageIndicator.textContent = stageTexts[state.stage] || state.stage;

                // Build prompt with user input
                const prompt = buildPrompt(state.stage, message);

                // Call AI
                await callAIStreaming(prompt);

                // Show choices for new stage
                showDefaultChoices();

                // Show suggestions
                const stageSuggestions = {
                    planning:    ['บอกรายละเอียดเพิ่มเติมเกี่ยวกับ BLOODCAR', 'แผนการมีความเสี่ยงอะไรบ้าง?', 'ต้องใช้เวลานานแค่ไหน?'],
                    recruitment: ['มิ้นน่าไว้วางใจไหม?', 'บิ๊กมีทักษะอะไรบ้าง?', 'ถ้าพวกเขาปฏิเสธจะทำอย่างไร?'],
                    rehearsal:   ['AI ผิดปกติอย่างไร?', 'ควรเลื่อนแผนออกไปไหม?', 'มีแผนสำรองไหม?'],
                    heist_begin: ['BLOODCAR เข้าไปได้ไหม?', 'ยามอยู่ที่ไหนบ้าง?', 'ระบบกล้องทำงานอยู่ไหม?'],
                    heist_crisis:['ปิดสัญญาณเตือนได้ไหม?', 'ต้องถอนตัวไหม?', 'BLOODCAR ทำอะไรอยู่?'],
                    ai_awakens:  ['AI รู้อะไรบ้าง?', 'ปิดมันได้ไหม?', 'มันอันตรายไหม?'],
                    betrayal:    ['มิ้นโกหกตลอดเวลาไหม?', 'ตำรวจรู้แผนทั้งหมดไหม?', 'บิ๊กรู้เรื่องนี้ไหม?'],
                    final_heist: ['BLOODCAR วางแผนอะไร?', 'มีทางออกอื่นไหม?', 'ถ้ายอมแพ้จะเกิดอะไรขึ้น?'],
                    escape:      ['เส้นทางหนีปลอดภัยไหม?', 'BLOODCAR ตามทันไหม?', 'ตำรวจไล่ทันไหม?'],
                    epilogue:    ['BLOODCAR ไปอยู่ที่ไหน?', 'มิ้นโดนอะไรบ้าง?', 'เอกรู้สึกอย่างไร?'],
                    questions:   ['ถามเรื่อง AI', 'ถามเรื่องตัวละคร', 'ถามเรื่องเทคนิค']
                };
                
                if (stageSuggestions[state.stage]) {
                    showSuggestions(stageSuggestions[state.stage]);
                }
                
                elements.statusText.textContent = '💬 พิมพ์การตัดสินใจของคุณ...';
                saveGame(true);

            } catch (error) {
                console.error('Error:', error);
                elements.storyText.innerHTML = `<span style="color: #ff6e40;">❌ เกิดข้อผิดพลาด: ${error.message}</span>`;
                elements.statusText.textContent = '⚠️ ไม่สามารถติดต่อ AI ได้';
            } finally {
                state.isWaitingForAI = false;
                state.isProcessing = false;
                updateInputState();
            }
        }

        // ============================================================
        // Reset Game
        // ============================================================
        function resetGame() {
            if (confirm('คุณแน่ใจหรือว่าต้องการเริ่มเกมใหม่? ข้อมูลที่บันทึกไว้จะหายไป')) {
                state.stage = 'intro';
                state.stageStep = 0;
                state.accuracy = 25;
                state.conversationHistory = [];
                state.lastStage = null;
                state.currentChoices = [];
                
                localStorage.removeItem('bloodcarGameSave');
                
                elements.storyText.innerHTML = '';
                elements.userInput.value = '';
                elements.statusText.textContent = '🎬 กำลังเตรียมการ...';
                elements.stageIndicator.textContent = stageTexts['intro'];
                hideChoices();
                hideSuggestions();
                
                initializeGame();
            }
        }

        // ============================================================
        // Event Listeners
        // ============================================================
        elements.sendBtn.addEventListener('click', sendMessage);
        elements.userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !state.isWaitingForAI) {
                sendMessage();
            }
        });
        elements.saveBtn.addEventListener('click', () => saveGame(false));
        elements.loadBtn.addEventListener('click', () => loadGame(true));
        elements.resetBtn.addEventListener('click', resetGame);
        elements.apiBtn.addEventListener('click', openApiModal);

        document.getElementById('api-modal').addEventListener('click', (e) => {
            if (e.target.id === 'api-modal') closeApiModal();
        });

        document.getElementById('api-provider-select').addEventListener('change', () => {
            updateProviderInfo();
        });

        document.getElementById('unified-api-key-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') saveApiKey();
        });

        // ============================================================
        // Initialize on Load
        // ============================================================
        window.addEventListener('load', () => {
            const apiKey = getApiKey();
            if (!apiKey) {
                elements.statusText.textContent = '⚠️ กรุณาตั้งค่า API Key ก่อนเริ่มเกม';
                openApiModal();
            } else {
                const hasSavedGame = loadGame(false);
                if (!hasSavedGame) {
                    state.conversationHistory = [];
                    state.lastStage = null;
                    initializeGame();
                } else {
                    state.conversationHistory = [];
                    state.lastStage = state.stage;
                    elements.statusText.textContent = '🎮 เริ่มเกมจากการบันทึกเดิม';
                    showDefaultChoices();
                }
            }
        });
    </script>
</body>
